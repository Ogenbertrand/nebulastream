services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: nebula-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula123}
      POSTGRES_DB: ${POSTGRES_DB:-nebulastream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nebula} -d ${POSTGRES_DB:-nebulastream}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nebula-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nebula-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: nebula-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nebula}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nebula123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - nebula-network

  # Backend API (FastAPI)
  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    container_name: nebula-backend
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    dns_opt:
      - "timeout:2"
      - "attempts:5"
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://nebula:nebula123@postgres:5432/nebulastream}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      TMDB_API_KEY: ${TMDB_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      DEBUG: ${DEBUG_DOCKER:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STREAM_PROVIDER_SKIP_SSL_VERIFY: ${STREAM_PROVIDER_SKIP_SSL_VERIFY:-false}
      STREAM_SCRAPER_ENABLED: ${STREAM_SCRAPER_ENABLED:-true}
      STREAM_SCRAPER_TIMEOUT_SECONDS: ${STREAM_SCRAPER_TIMEOUT_SECONDS:-20}
      STREAM_SCRAPER_WAIT_MS: ${STREAM_SCRAPER_WAIT_MS:-2500}
      STREAM_SCRAPER_MAX_CONCURRENCY: ${STREAM_SCRAPER_MAX_CONCURRENCY:-2}
      STREAM_SCRAPER_CACHE_TTL: ${STREAM_SCRAPER_CACHE_TTL:-7200}
      CAPTCHA_2CAPTCHA_API_KEY: ${CAPTCHA_2CAPTCHA_API_KEY}
      CAPTCHA_2CAPTCHA_TIMEOUT_SECONDS: ${CAPTCHA_2CAPTCHA_TIMEOUT_SECONDS:-120}
      CAPTCHA_2CAPTCHA_POLL_SECONDS: ${CAPTCHA_2CAPTCHA_POLL_SECONDS:-5}
      VIDSRC_RCP_COOKIE: ${VIDSRC_RCP_COOKIE:-}
      VIDSRC_TURNSTILE_INTERCEPT: ${VIDSRC_TURNSTILE_INTERCEPT:-true}
      VIDSRC_TURNSTILE_INTERCEPT_TIMEOUT_SECONDS: ${VIDSRC_TURNSTILE_INTERCEPT_TIMEOUT_SECONDS:-25}
      STREAMING_SERVICE_URL: ${STREAMING_SERVICE_URL_DOCKER:-http://streaming-service:8090}
      STREAMING_SERVICE_TIMEOUT_SECONDS: ${STREAMING_SERVICE_TIMEOUT_SECONDS:-15}
      STREAMING_PREFER_INTERNAL: ${STREAMING_PREFER_INTERNAL:-true}
      CATALOG_AGGREGATOR_URL: ${CATALOG_AGGREGATOR_URL_DOCKER:-http://catalog-aggregator:8100}
      CATALOG_AGGREGATOR_TIMEOUT_SECONDS: ${CATALOG_AGGREGATOR_TIMEOUT_SECONDS:-5}
      TORRENT_ENGINE_TIMEOUT_SECONDS: ${TORRENT_ENGINE_TIMEOUT_SECONDS:-15}
      TORRENT_ENGINE_URL: ${TORRENT_ENGINE_URL_DOCKER:-http://torrent-engine:8081}
      TORRENT_INGEST_POLL_SECONDS: ${TORRENT_INGEST_POLL_SECONDS:-5}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend-api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      streaming-service:
        condition: service_started
    networks:
      - nebula-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Stream Proxy (Rust)
  stream-proxy:
    build:
      context: .
      dockerfile: services/stream-proxy/Dockerfile
    container_name: nebula-stream-proxy
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      STREAM_PROXY_HOST: ${STREAM_PROXY_HOST:-0.0.0.0}
      STREAM_PROXY_PORT: ${STREAM_PROXY_PORT:-8080}
    ports:
      - "8080:8080"
    networks:
      - nebula-network

  # Torrent Engine (Rust)
  torrent-engine:
    build:
      context: .
      dockerfile: services/torrent-engine/Dockerfile
    container_name: nebula-torrent-engine
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      TORRENT_ENGINE_HOST: ${TORRENT_ENGINE_HOST:-0.0.0.0}
      TORRENT_ENGINE_PORT: ${TORRENT_ENGINE_PORT:-8081}
      TORRENT_DOWNLOAD_PATH: ${TORRENT_DOWNLOAD_PATH:-/tmp/torrents}
    volumes:
      - torrent_data:/tmp/torrents
    ports:
      - "8081:8081"
    networks:
      - nebula-network

  # Streaming Service (Rust)
  streaming-service:
    build:
      context: .
      dockerfile: services/streaming-service/Dockerfile
    container_name: nebula-streaming-service
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      STREAMING_SERVICE_HOST: ${STREAMING_SERVICE_HOST:-0.0.0.0}
      STREAMING_SERVICE_PORT: ${STREAMING_SERVICE_PORT:-8090}
      STREAMING_PUBLIC_URL: ${STREAMING_PUBLIC_URL:-http://localhost:8090}
      STREAMING_SIGNING_SECRET: ${STREAMING_SIGNING_SECRET:-dev-streaming-secret-change-me}
      STREAMING_SESSION_TTL_SECONDS: ${STREAMING_SESSION_TTL_SECONDS:-21600}
      STREAMING_MANIFEST_TTL_SECONDS: ${STREAMING_MANIFEST_TTL_SECONDS:-21600}
      STREAMING_SEGMENT_TTL_SECONDS: ${STREAMING_SEGMENT_TTL_SECONDS:-21600}
      STREAMING_UPSTREAM_TIMEOUT_SECONDS: ${STREAMING_UPSTREAM_TIMEOUT_SECONDS:-15}
      STREAMING_S3_ENDPOINT: ${STREAMING_S3_ENDPOINT_DOCKER:-http://minio:9000}
      STREAMING_S3_REGION: ${STREAMING_S3_REGION:-us-east-1}
      STREAMING_S3_BUCKET: ${STREAMING_S3_BUCKET:-nebula-media}
      STREAMING_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-nebula}
      STREAMING_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-nebula123}
      STREAMING_S3_FORCE_PATH_STYLE: ${STREAMING_S3_FORCE_PATH_STYLE:-true}
      STREAMING_TRANSCODE_ENABLED: ${STREAMING_TRANSCODE_ENABLED:-true}
      STREAMING_TRANSCODE_OUTPUT_DIR: ${STREAMING_TRANSCODE_OUTPUT_DIR:-/tmp/nebula-transcode}
      STREAMING_TRANSCODE_SEGMENT_SECONDS: ${STREAMING_TRANSCODE_SEGMENT_SECONDS:-4}
      STREAMING_TRANSCODE_PRESET: ${STREAMING_TRANSCODE_PRESET:-veryfast}
      STREAMING_TRANSCODE_READY_TIMEOUT_SECONDS: ${STREAMING_TRANSCODE_READY_TIMEOUT_SECONDS:-8}
      STREAMING_TRANSCODE_UPLOAD: ${STREAMING_TRANSCODE_UPLOAD:-true}
    ports:
      - "8090:8090"
    volumes:
      - transcode_data:/tmp/nebula-transcode
    depends_on:
      - minio
    networks:
      - nebula-network

  # Catalog Aggregator (FastAPI)
  catalog-aggregator:
    build:
      context: .
      dockerfile: services/catalog-aggregator/Dockerfile
    container_name: nebula-catalog-aggregator
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    dns_opt:
      - "timeout:2"
      - "attempts:5"
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      WATCHMODE_API_KEY: ${WATCHMODE_API_KEY}
      CATALOG_AGGREGATOR_LOG_LEVEL: ${LOG_LEVEL:-info}
      CATALOG_AGGREGATOR_TIMEOUT_SECONDS: ${CATALOG_AGGREGATOR_TIMEOUT_SECONDS:-8}
      CATALOG_AGGREGATOR_REDIS_URL: ${CATALOG_AGGREGATOR_REDIS_URL_DOCKER:-redis://redis:6379/1}
    ports:
      - "8100:8100"
    networks:
      - nebula-network
    depends_on:
      - redis

  # Frontend (React)
  frontend:
    image: node:20-alpine
    container_name: nebula-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
      REACT_APP_STREAM_PROXY_URL: ${REACT_APP_STREAM_PROXY_URL:-http://localhost:8080}
      CHOKIDAR_USEPOLLING: "true"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_LOGLEVEL: "warn"
    working_dir: /app
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend-api
      - stream-proxy
    networks:
      - nebula-network
    command: sh -c "if [ ! -f node_modules/.bin/react-scripts ]; then npm install --no-audit --no-fund; fi; npm start"

volumes:
  postgres_data:
  redis_data:
  torrent_data:
  minio_data:
  transcode_data:
  frontend_node_modules:

networks:
  nebula-network:
    driver: bridge
