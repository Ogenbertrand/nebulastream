services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: nebula-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula123}
      POSTGRES_DB: ${POSTGRES_DB:-nebulastream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nebula} -d ${POSTGRES_DB:-nebulastream}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nebula-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nebula-network

  # Backend API (FastAPI)
  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    container_name: nebula-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://nebula:nebula123@postgres:5432/nebulastream}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      TMDB_API_KEY: ${TMDB_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      DEBUG: ${DEBUG_DOCKER:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend-api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nebula-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Stream Proxy (Rust)
  stream-proxy:
    build:
      context: .
      dockerfile: services/stream-proxy/Dockerfile
    container_name: nebula-stream-proxy
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      STREAM_PROXY_HOST: ${STREAM_PROXY_HOST:-0.0.0.0}
      STREAM_PROXY_PORT: ${STREAM_PROXY_PORT:-8080}
    ports:
      - "8080:8080"
    networks:
      - nebula-network

  # Torrent Engine (Rust)
  torrent-engine:
    build:
      context: .
      dockerfile: services/torrent-engine/Dockerfile
    container_name: nebula-torrent-engine
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      TORRENT_ENGINE_HOST: ${TORRENT_ENGINE_HOST:-0.0.0.0}
      TORRENT_ENGINE_PORT: ${TORRENT_ENGINE_PORT:-8081}
      TORRENT_DOWNLOAD_PATH: ${TORRENT_DOWNLOAD_PATH:-/tmp/torrents}
    volumes:
      - torrent_data:/tmp/torrents
    ports:
      - "8081:8081"
    networks:
      - nebula-network

  # Frontend (React)
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: nebula-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
      REACT_APP_STREAM_PROXY_URL: ${REACT_APP_STREAM_PROXY_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend-api
      - stream-proxy
    networks:
      - nebula-network

volumes:
  postgres_data:
  redis_data:
  torrent_data:

networks:
  nebula-network:
    driver: bridge
