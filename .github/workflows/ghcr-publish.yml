name: Publish Docker Images (GHCR)

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            image: ghcr.io/${{ github.repository_owner }}/nebula-frontend
            context: .
            dockerfile: apps/frontend/Dockerfile
          - name: backend-api
            image: ghcr.io/${{ github.repository_owner }}/nebula-backend-api
            context: .
            dockerfile: apps/backend-api/Dockerfile
          - name: stream-proxy
            image: ghcr.io/${{ github.repository_owner }}/nebula-stream-proxy
            context: .
            dockerfile: services/stream-proxy/Dockerfile
          - name: torrent-engine
            image: ghcr.io/${{ github.repository_owner }}/nebula-torrent-engine
            context: .
            dockerfile: services/torrent-engine/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
          flavor: |
            latest=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
