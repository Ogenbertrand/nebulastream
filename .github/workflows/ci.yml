name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Lint, Typecheck, Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Build
        run: npm run build

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/backend-api/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r apps/backend-api/requirements.txt

      - name: Compile check
        run: python -m compileall apps/backend-api

      - name: Tests (if any)
        run: |
          python -m pytest -q || [ $? -eq 5 ]

  rust:
    name: Rust (Check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Stream Proxy Format Check
        run: cargo fmt --manifest-path services/stream-proxy/Cargo.toml -- --check

      - name: Stream Proxy Check
        run: cargo check --manifest-path services/stream-proxy/Cargo.toml

      - name: Stream Proxy Clippy
        run: cargo clippy --manifest-path services/stream-proxy/Cargo.toml

      - name: Torrent Engine Format Check
        run: cargo fmt --manifest-path services/torrent-engine/Cargo.toml -- --check

      - name: Torrent Engine Check
        run: cargo check --manifest-path services/torrent-engine/Cargo.toml

      - name: Torrent Engine Clippy
        run: cargo clippy --manifest-path services/torrent-engine/Cargo.toml
